<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            margin: 20px;
        }
        h1 {
            margin-bottom: 10px;
        }
        p.description {
            margin-bottom: 20px;
        }
        .form-row {
            margin-bottom: 5px;
        }
        label {
            display: inline-block;
            width: 130px;
            text-align: right;
            margin-right: 5px;
            vertical-align: top;
        }
        input, select {
            width: 350px;
            box-sizing: border-box;
            border: 1px solid #000;
        }
        select {
            height: 140px;
            overflow-y: scroll;
        }
        
        /* CSS for validating inputs to change background colors */
        input:invalid, select:invalid {
            background-color: pink;
        }
        input:valid, select:valid {
            background-color: lightgreen;
        }

        .button-group {
            margin-top: 10px;
            margin-left: 140px;
        }
        button {
            padding: 3px 10px;
            margin-right: 5px;
        }
        
        #output {
            margin-top: 20px;
            font-family: "Times New Roman", Times, serif;
        }
        #output h3 {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <h1>Create an Account</h1>
    <p class="description">All fields are required. Enter appropriate values in the text boxes. Select one or more security questions. Then click the Done button to review your choices.</p>

    <form id="accountForm">
        <div class="form-row">
            <label for="fullName">Full name:</label>
            <input type="text" id="fullName" required>
        </div>
        <div class="form-row">
            <label for="username">Username:</label>
            <input type="text" id="username" required>
        </div>
        <div class="form-row">
            <label for="password">Password:</label>
            <input type="password" id="password" required>
        </div>
        <div class="form-row">
            <label for="email">Email address:</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-row">
            <label for="phone">Phone number:</label>
            <input type="tel" id="phone" placeholder="123-456-7890" pattern="\d{3}-\d{3}-\d{4}" required>
        </div>
        <div class="form-row">
            <label for="securityQuestions">Security questions:</label>
            <select id="securityQuestions" multiple required>
                <option value="At what age did your childhood pet run away?">At what age did your childhood pet run away?</option>
                <option value="What was the name of your favorite unpaid internship?">What was the name of your favorite unpaid internship?</option>
                <option value="What is the maiden name of your best friend's maternal grandmother?">What is the maiden name of your best friend's maternal grandmother?</option>
                <option value="What is the name of your favorite canceled TV show?">What is the name of your favorite canceled TV show?</option>
                <option value="On what street did you lose your childlike sense of wonder?">On what street did you lose your childlike sense of wonder?</option>
                <option value="What are you wearing?">What are you wearing?</option>
                <option value="What sports team do you fetishize to avoid meaningful discussion with others?">What sports team do you fetishize to avoid meaningful discussion with others?</option>
                <option value="In what year did you stop trying?">In what year did you stop trying?</option>
            </select>
        </div>
        
        <div class="button-group">
            <button type="button" id="doneBtn">Done</button>
            <button type="reset" id="resetBtn">Reset</button>
        </div>
    </form>

    <div id="output"></div>

    <script>
        const form = document.getElementById('accountForm');
        const doneBtn = document.getElementById('doneBtn');
        const resetBtn = document.getElementById('resetBtn');
        const outputDiv = document.getElementById('output');

        doneBtn.addEventListener('click', function() {
            // Check if all fields pass HTML5 validation rules
            if (form.checkValidity()) {
                // If valid, retrieve data
                const fullName = document.getElementById('fullName').value;
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const email = document.getElementById('email').value;
                const phone = document.getElementById('phone').value;
                
                // Retrieve selected options from the multiple select
                const securityQuestions = document.getElementById('securityQuestions');
                const selectedOptions = Array.from(securityQuestions.selectedOptions).map(opt => opt.value);
                
                // Format the output string
                let resultHTML = `<h3>Review your entries:</h3>`;
                resultHTML += `Name: ${fullName}<br>`;
                resultHTML += `Username: ${username}<br>`;
                resultHTML += `Password: ${password}<br>`;
                resultHTML += `Email address: ${email}<br>`;
                resultHTML += `Phone number: ${phone}<br>`;
                resultHTML += `Security questions:<br>`;
                
                selectedOptions.forEach(question => {
                    resultHTML += `${question}<br>`;
                });
                
                outputDiv.innerHTML = resultHTML;
            } else {
                // If invalid, display an error message
                outputDiv.innerHTML = `<strong>Invalid input. Please ensure all fields are filled out correctly.</strong>`;
            }
        });

        // Clear the output message when the user resets the form
        resetBtn.addEventListener('click', function() {
            outputDiv.innerHTML = '';
        });
    </script>
</body>
</html>
