<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Bouncing Game - Ignacio Diaz </title>
    <style>
        * { padding: 0; margin: 0; }
        body { 
            background: #050505; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas { 
            background: #000; 
            display: block; 
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); 
            border: 2px solid #222;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<canvas id="myCanvas" width="480" height="320"></canvas>

<script>
    var canvas = document.getElementById("myCanvas");
    var ctx = canvas.getContext("2d");
    
    // Configuración de la bola
    var ballRadius = 8;
    var x = canvas.width/2;
    var y = canvas.height-30;
    var dx = 3;
    var dy = -3;
    
    // Configuración de la barra (AMARILLA)
    var paddleHeight = 12;
    var paddleWidth = 100;
    var paddleX = (canvas.width-paddleWidth)/2;
    var rightPressed = false;
    var leftPressed = false;

    // Configuración de bloques (ROJOS y más numerosos)
    var brickRowCount = 8; 
    var brickColumnCount = 5; 
    var brickWidth = 50;
    var brickHeight = 18;
    var brickPadding = 6;
    var brickOffsetTop = 45;
    var brickOffsetLeft = 20;
    
    var score = 0;
    var lives = 3;

    var bricks = [];
    for(var c=0; c<brickColumnCount; c++) {
        bricks[c] = [];
        for(var r=0; r<brickRowCount; r++) {
            bricks[c][r] = { x: 0, y: 0, status: 1 };
        }
    }

    document.addEventListener("keydown", keyDownHandler, false);
    document.addEventListener("keyup", keyUpHandler, false);
    document.addEventListener("mousemove", mouseMoveHandler, false);

    function keyDownHandler(e) {
        if(e.code == "ArrowRight") rightPressed = true;
        else if(e.code == 'ArrowLeft') leftPressed = true;
    }
    function keyUpHandler(e) {
        if(e.code == 'ArrowRight') rightPressed = false;
        else if(e.code == 'ArrowLeft') leftPressed = false;
    }
    function mouseMoveHandler(e) {
        var relativeX = e.clientX - canvas.offsetLeft;
        if(relativeX > 0 && relativeX < canvas.width) {
            paddleX = relativeX - paddleWidth/2;
        }
    }

    function collisionDetection() {
        for(var c=0; c<brickColumnCount; c++) {
            for(var r=0; r<brickRowCount; r++) {
                var b = bricks[c][r];
                if(b.status == 1) {
                    if(x > b.x && x < b.x+brickWidth && y > b.y && y < b.y+brickHeight) {
                        dy = -dy;
                        b.status = 0;
                        score++;
                        if(score == brickRowCount*brickColumnCount) {
                            alert("¡LO LOGRASTE!");
                            document.location.reload();
                        }
                    }
                }
            }
        }
    }

    function drawBall() {
        ctx.beginPath();
        ctx.arc(x, y, ballRadius, 0, Math.PI*2);
        ctx.fillStyle = "#FFFFFF"; 
        ctx.fill();
        ctx.closePath();
    }

    function drawPaddle() {
        ctx.beginPath();
        // Barra Amarilla con bordes redondeados
        ctx.roundRect(paddleX, canvas.height-paddleHeight-5, paddleWidth, paddleHeight, 8);
        ctx.fillStyle = "#FFD700"; 
        ctx.fill();
        // Efecto de relieve
        ctx.strokeStyle = "rgba(255,255,255,0.5)";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.closePath();
    }

    function drawBricks() {
        for(var c=0; c<brickColumnCount; c++) {
            for(var r=0; r<brickRowCount; r++) {
                if(bricks[c][r].status == 1) {
                    var brickX = (r*(brickWidth+brickPadding))+brickOffsetLeft;
                    var brickY = (c*(brickHeight+brickPadding))+brickOffsetTop;
                    bricks[c][r].x = brickX;
                    bricks[c][r].y = brickY;
                    ctx.beginPath();
                    ctx.roundRect(brickX, brickY, brickWidth, brickHeight, 4);
                    ctx.fillStyle = "#FF4136"; 
                    ctx.fill();
                    ctx.closePath();
                }
            }
        }
    }

    function drawScore() {
        ctx.font = "bold 15px Arial";
        ctx.fillStyle = "#FFD700"; // Texto amarillo
        ctx.fillText("Puntos: " + score, 20, 25);
    }

    function drawLives() {
        ctx.font = "bold 15px Arial";
        ctx.fillStyle = "#FFD700"; // Texto amarillo
        ctx.fillText("Vidas: " + lives, canvas.width-85, 25);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBricks();
        drawBall();
        drawPaddle();
        drawScore();
        drawLives();
        collisionDetection();

        if(x + dx > canvas.width-ballRadius || x + dx < ballRadius) {
            dx = -dx;
        }
        if(y + dy < ballRadius) {
            dy = -dy;
        }
        else if(y + dy > canvas.height-ballRadius-5) {
            if(x > paddleX && x < paddleX + paddleWidth) {
                dy = -dy;
                // Aumento progresivo de dificultad
                dx *= 1.01;
                dy *= 1.01;
            }
            else if(y + dy > canvas.height-ballRadius) {
                lives--;
                if(!lives) {
                    alert("GAME OVER");
                    document.location.reload();
                }
                else {
                    x = canvas.width/2;
                    y = canvas.height-30;
                    dx = 3;
                    dy = -3;
                    paddleX = (canvas.width-paddleWidth)/2;
                }
            }
        }

        if(rightPressed && paddleX < canvas.width-paddleWidth) {
            paddleX += 8;
        }
        else if(leftPressed && paddleX > 0) {
            paddleX -= 8;
        }

        x += dx;
        y += dy;
        requestAnimationFrame(draw);
    }

    draw();
</script>

</body>
</html>
